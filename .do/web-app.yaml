name: cladecanvas-web
region: nyc

static_sites:
  - name: web
    github:
      repo: shesanth/CladeCanvas
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm run build:web
    output_dir: cladecanvas/cladecanvas-ui/out
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_BASE
        scope: BUILD_TIME
        value: https://api.cladecanvas.org
